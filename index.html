<!DOCTYPE html>
<html>
  <body>
<pre id="pi">Loading...</pre>
<script>
fetch("pi.txt")
  .then(response => response.text())
  .then(text => {
    document.getElementById("pi").textContent = text;
  })
  .catch(err => {
    document.getElementById("pi").textContent = "Error loading pi.txt";
  });
</script>
</body>
</html>
